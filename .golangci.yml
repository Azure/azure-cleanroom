version: "2"
linters:
  settings:
    govet:
      enable:
        # Report about shadowed variables. We avoid shadowed variables as it can create confusion
        # around its usage around which err variable is getting used in statements like
        # "x, err := someFunc()" when intent is to capture the error being returned from a method
        # in a single common err variable.
        - shadow
    staticcheck:
      checks:
        - "all"
        # Disable stylecheck rules (ST*) that were not enabled in golangci-lint v1.
        # In v2, staticcheck subsumes the stylecheck linter. Excluding ST* maintains
        # backward compatibility with the v1 configuration.
        - "-ST*"
  exclusions:
    generated: lax
    rules:
      # TODO (HPrabh): Fix the following issues separately.
      - linters:
          - staticcheck
        # Some packages [go.opentelemetry.io/otel/trace] are using deprecated APIs.
        text: 'SA1019:'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
