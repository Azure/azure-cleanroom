apiVersion: v1
kind: Pod
metadata:
  name: nginx-vn2
  labels:
    app: nginx-vn2
spec:
  nodeSelector:
    virtualization: "virtualnode2"
  tolerations:
    - effect: NoSchedule
      key: virtual-kubelet.io/provider
      operator: Exists
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-vn2-service
spec:
  type: ClusterIP
  selector:
    app: nginx-vn2
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
