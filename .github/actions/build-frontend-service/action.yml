name: Build Frontend Service
description: Build Frontend Service

inputs:
  tag:
    required: true
    description: The tag

runs:
  using: composite
  steps:
    - uses: ./.github/actions/build-container-and-artefacts
      with:
        name: frontend-service
        tag: ${{ inputs.tag }}
        dockerfile: build/docker/Dockerfile.frontend-service
        context: ${{ github.workspace }}
