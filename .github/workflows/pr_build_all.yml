name: "PR Validation: Build"

on:
  workflow_call:
    inputs:
      # Comma-separated list of build groups to run (e.g., "build-shared-containers,build-cgs-containers").
      # Use "all" (default) to run every build group.
      build-groups:
        type: string
        required: false
        default: "all"

permissions:
  contents: read  # This is required for actions/checkout
  checks: write   # This is required to generate the test report
  id-token: write # This is required for generating OIDC access token

# # When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# # PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
# concurrency:
#   group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
#   cancel-in-progress: true

jobs:
  build-shared-containers:
    if: ${{ inputs.build-groups == 'all' || contains(inputs.build-groups, 'build-shared-containers') }}
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=build-shared-containers-${{ matrix.container }}-${{ github.run_id }}-${{ github.run_attempt }}"]
    environment: pr
    strategy:
      matrix:
        container: [ccr-proxy, skr, ccr-governance, ccr-governance-virtual, local-skr, local-idp, otel-collector, cvm-attestation-verifier, cvm-attestation-agent, api-server-proxy]
      # Prevent Github from cancelling other jobs of the matrix if one of them fails.
      fail-fast: false
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      USE_PREPROVISIONED_OIDC: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Add docker user
        shell: bash
        run: sudo usermod -aG docker $USER

      - name: Login to Azure and refresh token
        uses: ./.github/actions/login-to-azure
        env:
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: pwsh
        run: az acr login -n ${{ vars.ACR_URL }}

      - name: Build shared containers
        run: pwsh ./build/onebox/build-containers.ps1 -tag ${{ github.run_id }} -repo ${{ vars.ACR_URL }} -containers ${{ matrix.container }}

  build-ccf-containers:
    if: ${{ inputs.build-groups == 'all' || contains(inputs.build-groups, 'build-ccf-containers') }}
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=build-ccf-containers-${{ matrix.container }}-${{ github.run_id }}-${{ github.run_attempt }}"]
    environment: pr
    strategy:
      matrix:
        container: [ccf-provider-client, ccf-recovery-agent, ccf-recovery-service, ccf-consortium-manager, ccf-runjs-app-virtual, ccf-runjs-app-snp, ccf-runjs-app-sandbox]
      # Prevent Github from cancelling other jobs of the matrix if one of them fails.
      fail-fast: false
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      USE_PREPROVISIONED_OIDC: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Add docker user
        shell: bash
        run: sudo usermod -aG docker $USER

      - name: Login to Azure and refresh token
        uses: ./.github/actions/login-to-azure
        env:
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: pwsh
        run: az acr login -n ${{ vars.ACR_URL }}

      - name: Build ccf containers
        run: pwsh ./build/ccf/build-ccf-infra-containers.ps1 -tag ${{ github.run_id }} -repo ${{ vars.ACR_URL }} -push -containers ${{ matrix.container }}

