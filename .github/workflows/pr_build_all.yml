          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: pwsh
        run: az acr login -n ${{ vars.ACR_URL }}

      - name: Build cgs containers
        run: pwsh ./build/ccf/build-ccf-infra-containers.ps1 -tag ${{ github.run_id }} -repo ${{ vars.ACR_URL }} -push -containers ${{ matrix.container }}

  build-ccr-containers:
    if: ${{ inputs.build-groups == 'all' || contains(inputs.build-groups, 'build-ccr-containers') }}
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=build-ccr-containers-${{ matrix.container }}-${{ github.run_id }}-${{ github.run_attempt }}"]
    environment: pr
    strategy:
      matrix:
        container: [blobfuse-launcher, s3fs-launcher, ccr-init, ccr-secrets, ccr-proxy-ext-processor, ccr-client-proxy, code-launcher, identity, ccr-governance-opa-policy, ccr-artefacts]
