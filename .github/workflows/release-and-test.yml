name: Release to test and run BVT
run-name: ${{ inputs.tag || github.sha }} - Test release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: The tag
        required: false
        type: string
      release-type:
        description: The release type
        type: string
        default: "cleanroom-containers, governance-client-containers, cgs-js-app, cgs-constitution, ccf-provider-client, ccf-network-containers, ccf-recovery-service-containers, ccf-consortium-manager-containers, cleanroom-workload-infra-containers, cleanroom-cluster-provider-client, frontend-service"
  workflow_call:
    inputs:
      tag:
        description: The tag
        required: false
        type: string
      release-type:
        description: The build type
        type: string
        default: "cleanroom-containers, governance-client-containers, cgs-js-app, cgs-constitution, ccf-provider-client, ccf-network-containers, ccf-recovery-service-containers, ccf-consortium-manager-containers, cleanroom-workload-infra-containers, cleanroom-cluster-provider-client, frontend-service"
      needs-attestation:
        description: Whether to attest released artefacts
        required: false
        type: boolean
        default: false
    secrets:
      registry-name:
        description: The registry name
        required: false

jobs:
  build:
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    uses: ./.github/workflows/official_build.yml
    with:
      tag: ${{ inputs.tag }}
      build-type: ${{ inputs.release-type }}

  release-to-test:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=release-to-test-${{ github.run_id }}-${{ github.run_attempt }}"]
    environment: test
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
      attestations: write
      packages: write
    needs: [build]
    env:
      GH_TOKEN: ${{ github.token }} # Needed for attestation verification
      GH_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: ./.github/actions/login-to-azure
        env:
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create file to track released containers
        run: touch released-containers-internal.txt

      - name: Upload built-containers artefact
        uses: actions/upload-artifact@v4
        with:
          name: released-containers-internal
          path: released-containers-internal.txt
          overwrite: true

      - name: Release cleanroom containers to test
        if: ${{ contains(inputs.release-type, 'cleanroom-containers') }}
        uses: ./.github/actions/release-cleanroom-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release cleanroom artefacts
        if: ${{ contains(inputs.release-type, 'cleanroom-containers') }}
        uses: ./.github/actions/release-cleanroom-artefacts
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release sidecar digests
        if: ${{ contains(inputs.release-type, 'cleanroom-containers') }}
        uses: ./.github/actions/release-sidecar-digests
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release governance client containers
        if: ${{ contains(inputs.release-type, 'governance-client-containers') }}
        uses: ./.github/actions/release-governance-client-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CGS JS App
        if: ${{ contains(inputs.release-type, 'cgs-js-app') }}
        uses: ./.github/actions/release-cgs-js-app
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CGS constitution
        if: ${{ contains(inputs.release-type, 'cgs-constitution') }}
        uses: ./.github/actions/release-cgs-constitution
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release ccr-containers version document
        if: ${{ contains(inputs.release-type, 'cleanroom-containers') }}
        uses: ./.github/actions/release-ccr-containers-version-document
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release constitution version document
        if: ${{ contains(inputs.release-type, 'cgs-constitution') }}
        uses: ./.github/actions/release-cgs-constitution-version-document
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CGS JS app version document
        if: ${{ contains(inputs.release-type, 'cgs-js-app') }}
        uses: ./.github/actions/release-cgs-js-app-version-document
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release version documents for governance client containers
        if: ${{ contains(inputs.release-type, 'governance-client-containers') }}
        uses: ./.github/actions/release-governance-client-version-documents
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF provider client
        if: ${{ contains(inputs.release-type, 'ccf-provider-client') }}
        uses: ./.github/actions/release-ccf-provider-client
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF network containers
        if: ${{ contains(inputs.release-type, 'ccf-network-containers') }}
        uses: ./.github/actions/release-ccf-network-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF recovery service containers
        if: ${{ contains(inputs.release-type, 'ccf-recovery-service-containers') }}
        uses: ./.github/actions/release-ccf-recovery-service-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF consortium manager containers
        if: ${{ contains(inputs.release-type, 'ccf-consortium-manager-containers') }}
        uses: ./.github/actions/release-ccf-consortium-manager-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release cleanroom workload infrastructure containers
        if: ${{ contains(inputs.release-type, 'cleanroom-workload-infra-containers') }}
        uses: ./.github/actions/release-cleanroom-workload-infra-containers
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release cleanroom cluster provider client
        if: ${{ contains(inputs.release-type, 'cleanroom-cluster-provider-client') }}
        uses: ./.github/actions/release-cleanroom-cluster-provider-client
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release Frontend Service container
        if: ${{ contains(inputs.release-type, 'frontend-service') }}
        uses: ./.github/actions/release-frontend-service
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release version documents for cleanroom cluster provider client
        if: ${{ contains(inputs.release-type, 'cleanroom-cluster-provider-client') }}
        uses: ./.github/actions/release-cleanroom-cluster-provider-client-version-documents
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF network security policy
        if: ${{ contains(inputs.release-type, 'ccf-network-containers') }}
        uses: ./.github/actions/release-ccf-network-security-policy
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF recovery service security policy
        if: ${{ contains(inputs.release-type, 'ccf-recovery-service-containers') }}
        uses: ./.github/actions/release-ccf-recovery-service-security-policy
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release CCF consortium manager security policy
        if: ${{ contains(inputs.release-type, 'ccf-consortium-manager-containers') }}
        uses: ./.github/actions/release-ccf-consortium-manager-security-policy
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release Frontend Service Security Policy
        if: ${{ contains(inputs.release-type, 'frontend-service') }}
        uses: ./.github/actions/release-frontend-service-security-policy
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release cleanroom workload infrastructure containers policy
        if: ${{ contains(inputs.release-type, 'cleanroom-workload-infra-containers') }}
        uses: ./.github/actions/release-cleanroom-workload-infra-containers-policy
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Release cleanroom az cli extension
        uses: ./.github/actions/release-azcliext-cleanroom
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          needs-attestation: ${{ inputs.needs-attestation }}

      - name: Verify attestation
        if: ${{ inputs.needs-attestation }}
        uses: ./.github/actions/verify-attestation
        with:
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag}}
          release-type: ${{ inputs.release-type }}
          environment: internal
          registry-name: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  pick-location:
    runs-on: ubuntu-latest
    outputs:
      location: ${{ steps.pick.outputs.location }}
    steps:
      - name: Pick a random Azure location
        id: pick
        shell: bash
        run: |
          # These are the locations where DC4as_v5 SKU is available that we use in Flex Node tests.
          # "westus" is removed as it is being used by another PR validation flow.
          locations=("westeurope" "northeurope" "germanywestcentral" "centralindia" "eastasia" "southeastasia" )
          index=$((RANDOM % ${#locations[@]}))
          echo "location=${locations[$index]}" >> "$GITHUB_OUTPUT"
          echo "Selected location: ${locations[$index]}"

  bvt-ml-training:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-ml-training-${{ matrix.key-store }}-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [build, release-to-test]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      TDP_HSM_RESOURCE_GROUP: 'azcleanroom-public-rg'
      TDP_MHSM_NAME: 'azcleanroombvthsm2'
      TDC_HSM_RESOURCE_GROUP: 'azcleanroom-public-rg'
      TDC_MHSM_NAME: 'azcleanroombvthsm2'
      USE_PREPROVISIONED_OIDC: "true"
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    strategy:
      matrix:
        key-store:  [akvpremium] #[mhsm, akvpremium]
      # Prevent Github from cancelling other jobs of the matrix if one of them fails.
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run ml-training test
        uses: ./.github/actions/test-multi-party-collab/test-ml-training-caci
        with:
          repo: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}.azurecr.io/internal/azurecleanroom
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          kvType: ${{ matrix.key-store }}

  bvt-encrypted-storage:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-encrypted-storage-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [build, release-to-test]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      USE_PREPROVISIONED_OIDC: "true"
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run encrypted-storage test
        uses: ./.github/actions/test-multi-party-collab/test-encrypted-storage-caci
        with:
          repo: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}.azurecr.io/internal/azurecleanroom
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}

  bvt-nginx-hello:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-nginx-hello-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [build, release-to-test]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      USE_PREPROVISIONED_OIDC: "true"
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run nginx-hello test
        uses: ./.github/actions/test-multi-party-collab/test-nginx-hello-caci
        with:
          repo: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}.azurecr.io/internal/azurecleanroom
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}

  bvt-setup-env-aks:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-setup-env-aks-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [build, release-to-test, pick-location]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      USE_PREPROVISIONED_OIDC: "true"
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup environment
        uses: ./.github/actions/test-workloads/setup-env
        with:
          repo: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}.azurecr.io/internal/azurecleanroom
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          infraType: aks
          location: ${{ needs.pick-location.outputs.location }}
          outDir: ${{ github.workspace }}/test/onebox/workload-samples-aks/generated

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanroom-deployment-artifacts-aks
          path: ./test/onebox/workload-samples-aks/generated
          overwrite: true
        if: success()

  bvt-big-data-query-analytics-aks:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-big-data-query-analytics-aks-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [bvt-setup-env-aks, pick-location]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: ${{ github.job }}
      USE_PREPROVISIONED_OIDC: "true"
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: cleanroom-deployment-artifacts-aks
          path: ./test/onebox/workload-samples-aks/generated

      - name: Run big data analytics tests
        uses: ./.github/actions/test-workloads/test-big-data-analytics
        with:
          repo: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}.azurecr.io/internal/azurecleanroom
          tag: ${{ inputs.tag || steps.get-short-commit-hash.outputs.tag }}
          deploymentConfigDir: ${{ github.workspace }}/test/onebox/workload-samples-aks/generated
          location: ${{ needs.pick-location.outputs.location }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: big-data-analytics-results-aks
          path: ./test/onebox/workload-samples-aks/generated
          overwrite: true
        if: ${{ !cancelled() }}

      - name: Delete AWS buckets
        if: success()
        shell: pwsh
        run: |
          pwsh ./test/onebox/multi-party-collab/big-data-query-analytics/delete-bucket.ps1 -bucketName "consumer-input-${{ env.JOB_ID }}-${{ env.RUN_ID }}"
          pwsh ./test/onebox/multi-party-collab/big-data-query-analytics/delete-bucket.ps1 -bucketName "consumer-output-${{ env.JOB_ID }}-${{ env.RUN_ID }}"

      - name: Delete resource groups
        if: success()
        shell: pwsh
        run: ./test/onebox/multi-party-collab/remove-resources.ps1 -tag "github_actions=${{ env.JOB_ID }}-${{ env.RUN_ID }}"

  bvt-cleanup-aks:
    runs-on: ["self-hosted", "1ES.Pool=azure-cleanroom-public", "1ES.JobId=bvt-cleanup-aks-${{ github.run_id }}-${{ github.run_attempt }}"]
    needs: [bvt-big-data-query-analytics-aks]
    environment: test
    env:
      RELEASE_ACR_NAME: ${{ secrets.registry-name || vars.RELEASE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RUN_ID: ${{ github.run_id }}
      JOB_ID: bvt-setup-env-aks
      RUN_ATTEMPT: ${{ github.run_attempt }}
    # Permission needed for logging into Azure - https://github.com/marketplace/actions/azure-login#workflow-examples
    permissions:
      id-token: write
      contents: read  # This is required for actions/checkout
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true
          ref: ${{ inputs.tag }}
      - uses: ./.github/actions/setup-docker-on-data-disk

      - name: Generate short commit hash
        if: ${{ inputs.tag == ''}}
        id: get-short-commit-hash
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: ./.github/actions/login-to-azure
        env:
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource groups
        shell: pwsh
        run: ./test/onebox/multi-party-collab/remove-resources.ps1 -tag "github_actions=${{ env.JOB_ID }}-${{ env.RUN_ID }}"
