name: governance-test
services:
  ccf:
    image: localhost:5000/ccf/app/run-js/sandbox:$ccfImageTag
    container_name: test-ccf
    ports:
      - "8080:8080"
    volumes:
      - ./sandbox_common/${initialMemberName}_cert.pem:/app/member0_cert.pem
      - ./sandbox_common/${initialMemberName}_enc_pubk.pem:/app/member0_enc_pubk.pem
    environment:
      - CCR_ATTESTATION_HOST=cvm-attestation-verifier
      - CCR_ATTESTATION_PORT=8901
  cvm-attestation-verifier:
    image: localhost:5000/cvm/cvm-attestation-verifier:latest
    ports:
      - "8901:8901"
  cgs-client-member0:
    image: localhost:5000/cgs-client:latest
    container_name: test-cgs-client-member0
    ports:
      - "8290:8080"
  cgs-ui-member0:
    image: localhost:5000/cgs-ui:latest
    container_name: test-cgs-ui-member0
    ports:
      - "0:6300"
    environment:
      - cgsclientEndpoint=http://cgs-client-member0:8080
  cgs-client-member1:
    image: localhost:5000/cgs-client:latest
    container_name: test-cgs-client-member1
    ports:
      - "8291:8080"
  cgs-ui-member1:
    image: localhost:5000/cgs-ui:latest
    container_name: test-cgs-ui-member1
    ports:
      - "0:6300"
    environment:
      - cgsclientEndpoint=http://cgs-client-member1:8080
  cgs-client-member2:
    image: localhost:5000/cgs-client:latest
    container_name: test-cgs-client-member2
    ports:
      - "8292:8080"
  cgs-ui-member2:
    image: localhost:5000/cgs-ui:latest
    container_name: test-cgs-ui-member2
    ports:
      - "0:6300"
    environment:
      - cgsclientEndpoint=http://cgs-client-member2:8080
  cgs-client-user-from-header:
    image: localhost:5000/cgs-client:latest
    container_name: test-cgs-user-from-header
    ports:
      - "8293:8080"
  cgs-client-ccfOperator:
    image: localhost:5000/cgs-client:latest
    container_name: test-cgs-client-ccf-operator
    ports:
      - "8299:8080"
  ccr-governance:
    image: localhost:5000/ccr-governance-virtual:latest
    container_name: test-ccr-governance
    ports:
      - "8990:8300"
    environment:
      - ccrgovEndpoint=https://test-ccf:8080
      - ccrgovApiPathPrefix=app/contracts/placeholder
      - serviceCertPath=/app/sandbox_common/service_cert.pem
      - INSECURE_VIRTUAL_DIR=/app/insecure-virtual/
    volumes:
      - ./sandbox_common:/app/sandbox_common:ro
  ccr-governance-2:
    image: localhost:5000/ccr-governance-virtual:latest
    container_name: test-ccr-governance-2
    ports:
      - "8991:8300"
    environment:
      - ccrgovEndpoint=https://test-ccf:8080
      - ccrgovApiPathPrefix=app/contracts/placeholder
      - serviceCertPath=/app/sandbox_common/service_cert.pem
      - INSECURE_VIRTUAL_DIR=/app/insecure-virtual-2/
    volumes:
      - ./sandbox_common:/app/sandbox_common:ro
  ccr-governance-jwt-local-idp:
    image: localhost:5000/ccr-governance:latest
    container_name: test-ccr-governance-jwt-local-idp
    ports:
      - "8992:8300"
    environment:
      - ccrgovAuthMode=LocalIdp
      - ccrgovEndpoint=https://test-ccf:8080
      - ccrgovApiPathPrefix=app/contracts/placeholder
      - serviceCertPath=/app/sandbox_common/service_cert.pem
      - LOCAL_IDP_ENDPOINT=http://test-local-idp:8399/oauth/token?oid=22222222-2222-2222-2222-222222222222&tid=33333333-3333-3333-3333-333333333333
    volumes:
      - ./sandbox_common:/app/sandbox_common:ro
  ccr-governance-jwt-azure-login:
    image: localhost:5000/ccr-governance:latest
    container_name: test-ccr-governance-jwt-azure-login
    ports:
      - "8993:8300"
    environment:
      - ccrgovAuthMode=AzureLogin
      - ccrgovEndpoint=https://test-ccf:8080
      - ccrgovApiPathPrefix=app/contracts/placeholder
      - serviceCertPath=/app/sandbox_common/service_cert.pem
      - IDENTITY_ENDPOINT=http://test-credentials-proxy:8080/token
      - IMDS_ENDPOINT="dummy_required_value"
    volumes:
      - ./sandbox_common:/app/sandbox_common:ro
  ccr-governance-cvm:
    image: localhost:5000/ccr-governance-virtual:latest
    container_name: test-ccr-governance-cvm
    ports:
      - "8994:8300"
    environment:
      - ccrgovEndpoint=https://test-ccf:8080
      - ccrgovApiPathPrefix=app/contracts/placeholder
      - serviceCertPath=/app/sandbox_common/service_cert.pem
      - INSECURE_VIRTUAL_DIR=/app/cvm/insecure-virtual/
    volumes:
      - ./sandbox_common:/app/sandbox_common:ro
  local-idp:
    image: localhost:5000/local-idp:latest
    container_name: test-local-idp
    ports:
      - "8319:8399"
  credentials-proxy:
    image: cleanroombuild.azurecr.io/workleap/azure-cli-credentials-proxy:1.2.5
    container_name: test-credentials-proxy
    ports:
      - "8329:8080"
    volumes:
      - ${HOME}/.azure:/app/.azure/
    user: "${credentialsProxyUid}:${credentialsProxyGid}"
