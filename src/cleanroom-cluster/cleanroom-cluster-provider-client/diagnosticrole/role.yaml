apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: diagnostic-role
  namespace: telemetry
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: diagnostic-rolebinding
  namespace: telemetry
subjects:
- kind: User
  name: <NAME>
roleRef:
  kind: Role
  name: diagnostic-role
  apiGroup: rbac.authorization.k8s.io
