openapi: 3.0.3
info:
  title: Analytics Frontend API
  description: Analytics Frontend API. Use following command to generate the typescript client - npx openapi-typescript ./openapi.yaml --output ./typescript.ts
  version: 2026-03-01-preview
paths:
  /collaborations:
    get:
      summary: List all collaborations
      operationId: collaboration_list_get
      parameters:
        - name: activeOnly
          in: query
          required: false
          description: >
            When true, returns only active collaborations (email-only lookup).
            When false or omitted, returns all collaborations.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaborationOutput'
  /collaborations/{collaborationId}:
    get:
      summary: Get collaboration by id
      operationId: collaboration_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: activeOnly
          in: query
          required: false
          description: >
            When true, queries only the email-based table (active
            collaborations). When false or omitted, queries all tables.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationOutput'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/report:
    get:
      summary: Get collaboration report
      operationId: collaboration_report_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaborationReportResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics:
    get:
      summary: Get collaboration analytics workload
      operationId: collaboration_analytics_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/datasets/{datasetId}/skrpolicy:
    get:
      summary: Get collaboration analytics skr policy for a dataset
      operationId: collaboration_analytics_skr_policy_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: datasetId
          in: path
          required: true
          schema:
            type: string    
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkrPolicy'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/oidc/issuerInfo:
    get:
      summary: Get collaboration OIDC issuer info
      operationId: collaboration_oidc_issuerInfo_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcIssuer'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/oidc/setIssuerUrl:
    post:
      summary: Set collaboration oidc issuer url
      operationId: collaboration_oidc_setIssuerUrl_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
               $ref: '#/components/schemas/SetIssuerUrlInput'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetIssuerUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/oidc/keys:
    get:
      summary: Get collaboration oidc signing keys (JWKS)
      operationId: collaboration_oidc_keys_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcKeys'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/invitations:
    get:
      summary: List all invitations
      operationId: collaboration_invitations_get
      security:
        - bearerAuth: []
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: pendingOnly
          in: query
          required: false
          description: >
            When true, returns only invitations where the user's status is not
            Active. When false or omitted, returns all matching invitations.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInvitationsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/invitations/{invitationId}:
    get:
      summary: Get invitation by id
      operationId: collaboration_invitation_invitation_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/invitations/{invitationId}/accept:
    post:
      summary: Accept invitation by id
      operationId: collaboration_invitation_invitation_id_accept_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/datasets:
    get:
      summary: List all datasets
      operationId: collaboration_analytics_datasets_list_get
      security:
        - bearerAuth: []
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/datasets/{documentId}:
    get:
      summary: Get dataset by id
      operationId: collaboration_analytics_datasets_document_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDatasetDocument'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/datasets/{documentId}/publish:
    post:
      summary: Publish dataset by id
      operationId: collaboration_analytics_datasets_document_id_publish_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
             schema:
               $ref: '#/components/schemas/DatasetDetails'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/consent/{documentId}:
    get:
      summary: Check execution consent by ID of the Query or the Dataset
      operationId: collaboration_consent_document_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    put:
      summary: Set execution consent (enable / disable) by ID of the Query or the Dataset
      operationId: collaboration_consent_document_id_put
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentActionRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries/{documentId}/publish:
    post:
      summary: Publish query by id
      operationId: collaboration_analytics_queries_document_id_publish_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryDetails'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries:
    get:
      summary: List all queries
      operationId: collaboration_analytics_queries_list_get
      security:
        - bearerAuth: []
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries/{documentId}:
    get:
      summary: Get query by id
      operationId: collaboration_analytics_queries_document_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetQueryDocument'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries/{documentId}/vote:
    post:
      summary: Vote on query by id
      operationId: collaboration_analytics_queries_document_id_vote_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries/{documentId}/run:
    post:
      summary: Run query by id
      operationId: collaboration_analytics_queries_document_id_run_post
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRunInput'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: 
                $ref : '#/components/schemas/QueryRunOutput'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/runs/{jobId}:
    get:
      summary: Get query run result by job id
      operationId: collaboration_analytics_runs_job_id_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryRunResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/queries/{documentId}/runs:
    get:
      summary: Get query run history by query id
      operationId: collaboration_analytics_queries_document_id_runs_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryRunHistory'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/datasets/{documentId}/queries:
    get:
      summary: Get queries by dataset id
      operationId: collaboration_analytics_datasets_document_id_queries_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/secrets/{secretName}:
    put:
      summary: Set secret for analytics workload
      operationId: collaboration_analytics_secrets_secret_name_put
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretValueRequest'
            example:
              secretValue: "eyJhd3NBY2Nlc3NLZXlJZCI6ICJBS0lBLi4uIiwgImF3c1NlY3JldEFjY2Vzc0tleSI6ICIuLi4ifQ=="
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetSecretResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /collaborations/{collaborationId}/analytics/auditevents:
    get:
      summary: Get audit events for analytics workload
      operationId: collaboration_analytics_auditevents_get
      parameters:
        - name: collaborationId
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: The event scope to query.
        - name: from_seqno
          in: query
          required: false
          schema:
            type: string
          description: Start of the ledger sequence number range.
        - name: to_seqno
          in: query
          required: false
          schema:
            type: string
          description: End of the ledger sequence number range.
        - $ref: '#/components/parameters/ApiVersion'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAuditEventsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ApiVersion:
      name: api-version
      in: query
      required: true
      description: The API version to use for this request.
      schema:
        type: string
        enum:
          - '2026-03-01-preview'
        default: '2026-03-01-preview'
  schemas:
    ValidationError:
      title: ValidationError
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
    UserStatus:
      title: userStatus
      type: string
      enum:
      - invited
      - active
    UserInfo:
      title: UserInfo
      type: object
      properties:
        userId:
          type: string
        data:
          $ref: '#/components/schemas/UserData'
          type: object
    UserData:
      title: UserData
      type: object
      properties:
        tenantId:
          type: string
    CollaborationOutput:
      type: object
      properties:
        collaborationId:
          type: string
        collaborationName:
          type: string
        userStatus:
          $ref: '#/components/schemas/UserStatus'
      title: CollaborationOutput
    Contract:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        data:
          type: string
          description: >
            JSON string matching the ContractData structure.
        state:
          type: string
      title: Contract
    ContractData:
      type: object
      properties:
        ccrgovEndpoint:
          type: string
        ccrgovApiPathPrefix:
          type: string
        ccrgovServiceCertDiscovery:
          $ref: '#/components/schemas/CcrgovServiceCertDiscovery'
        ccfNetworkRecoveryMembers:
          type: array
          items:
            type: object
      title: ContractData
    CcrgovServiceCertDiscovery:
      type: object
      properties:
        endpoint:
          type: string
        snpHostData:
          type: string
        constitutionDigest:
          type: string
        jsappBundleDigest:
          type: string
      title: CcrgovServiceCertDiscovery
    DeploymentInfo:
      type: object
      properties:
        data:
          type: object
      title: DeploymentInfo
    SkrPolicy:
      type: object
      required:
        - anyOf
        - version
      properties:
        anyOf:
          type: array
          items:
            $ref: '#/components/schemas/SkrPolicyAnyOf'
          description: Array of SKR policy conditions
        version:
          type: string
          description: SKR policy version
          example: "1.0.0"
      title: SkrPolicy
      description: SKR (Secure Key Release) policy structure for cleanroom attestation
    SkrPolicyAnyOf:
      type: object
      required:
        - allOf
        - authority
      properties:
        allOf:
          type: array
          items:
            $ref: '#/components/schemas/SkrPolicyClaim'
          description: Array of claims that must all be satisfied
        authority:
          type: string
          description: MAA (Microsoft Azure Attestation) endpoint URL
          example: "https://sharedeus2.eus2.test.attest.azure.net"
      title: SkrPolicyAnyOf
    SkrPolicyClaim:
      type: object
      required:
        - claim
        - equals
      properties:
        claim:
          type: string
          description: Name of the attestation claim
          example: "x-ms-sevsnpvm-hostdata"
        equals:
          type: string
          description: Expected value of the claim
      title: SkrPolicyClaim
    OidcIssuer:
      type: object
      properties:
        enabled:
          type: boolean
        issuerUrl:
          type: string
          nullable: true
        tenantData:
          $ref: '#/components/schemas/TenantData'
          nullable: true
      title: OidcIssuer
    TenantData:
      type: object
      properties:
        tenantId:
          type: string
        issuerUrl:
          type: string
      required:
        - tenantId
        - issuerUrl
      title: TenantData
    SetIssuerUrlInput:
      type: object
      properties:
        url:
          type: string
      required:
        - url
      title: SetIssuerUrlInput
    SetIssuerUrlResponse:
      type: object
      properties:
        url:
          type: string
          description: The OIDC issuer URL that was set
        message:
          type: string
          description: Success message
      required:
        - url
        - message
      title: SetIssuerUrlResponse
    OidcKeys:
      type: object
      description: JSON Web Key Set (JWKS) containing OIDC signing keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JsonWebKey'
      required:
        - keys
      title: OidcKeys
    JsonWebKey:
      type: object
      description: JSON Web Key (JWK) as defined in RFC 7517
      properties:
        kty:
          type: string
          description: Key type (e.g., RSA, EC)
        kid:
          type: string
          description: Key ID
          nullable: true
        use:
          type: string
          description: Public key use (e.g., sig, enc)
          nullable: true
        alg:
          type: string
          description: Algorithm (e.g., RS256)
          nullable: true
        n:
          type: string
          description: RSA modulus (Base64urlUInt-encoded)
          nullable: true
        e:
          type: string
          description: RSA exponent (Base64urlUInt-encoded)
          nullable: true
        x5c:
          type: array
          items:
            type: string
          description: X.509 certificate chain
          nullable: true
        x5t:
          type: string
          description: X.509 certificate SHA-1 thumbprint
          nullable: true
        x5t#S256:
          type: string
          description: X.509 certificate SHA-256 thumbprint
          nullable: true
      required:
        - kty
      title: JsonWebKey
