          $ref: '#/components/schemas/JobRun'
          nullable: true
          description: The most recent job run for this query.
        runs:
          type: array
          items:
            $ref: '#/components/schemas/JobRun'
          description: List of all job runs for this query.
        summary:
          $ref: '#/components/schemas/JobRecordSummary'
          nullable: true
          description: Summary statistics for all runs of this query.
      required:
        - queryId
        - runs
    JobRun:
      type: object
      properties:
        runId:
          type: string
          description: Unique identifier for this job run.
        startTime:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the job started execution.
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the job completed execution.
        isSuccessful:
          type: boolean
          description: Indicates whether the job run completed successfully.
        error:
          $ref: '#/components/schemas/JobRunError'
          nullable: true
          description: Error details if the job run failed.
        stats:
          $ref: '#/components/schemas/JobRunStats'
          nullable: true
          description: Statistics about data processed during the job run.
        durationSeconds:
          type: number
          format: double
          readOnly: true
          description:
            Duration of the job run in seconds. Calculated from startTime and
            endTime.
      required:
        - runId
        - isSuccessful
    JobRunError:
      type: object
      properties:
        code:
          type: string
          description: Error code identifying the type of error.
        message:
          type: string
          description: Human-readable error message describing the failure.
      required:
        - code
        - message
    JobRunStats:
      type: object
      properties:
        rowsRead:
          type: integer
          format: int32
          description: Number of rows read during the job execution.
        rowsWritten:
          type: integer
          format: int32
          description: Number of rows written during the job execution.
      required:
        - rowsRead
        - rowsWritten
    JobRecordSummary:
      type: object
      properties:
        totalRuns:
          type: integer
          format: int32
          description: Total number of job runs for this query.
        successfulRuns:
          type: integer
          format: int32
          description: Number of job runs that completed successfully.
        failedRuns:
          type: integer
          format: int32
          description: Number of job runs that failed.
        totalRuntimeSeconds:
          type: number
          format: double
          description: Total execution time across all runs in seconds.
        avgDurationSeconds:
          type: number
          format: double
          description: Average execution time per run in seconds.
        totalRowsRead:
          type: integer
          format: int32
          description: Total number of rows read across all runs.
        totalRowsWritten:
          type: integer
          format: int32
          description: Total number of rows written across all runs.
      required:
        - totalRuns
        - successfulRuns
        - failedRuns
        - totalRuntimeSeconds
        - avgDurationSeconds
        - totalRowsRead
        - totalRowsWritten
