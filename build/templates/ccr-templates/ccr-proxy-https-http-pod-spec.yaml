apiVersion: v1
kind: Pod
spec:
  containers:
  - name: ccr-proxy
    image: $containerRegistryUrl/ccr-proxy@$digest
    command:
    - /bin/bash
    - https-http/bootstrap.sh
    - --ca-type
    - $caType
    env:
    - name: CCR_ENVOY_LISTENER_HTTPS_PORT
      value: "$listenerPort"
    - name: CCR_ENVOY_DESTINATION_PORT
      value: "$destinationPort"
    - name: CCR_ENVOY_SERVICE_CERT_OUTPUT_FILE
      value: /app/service/service-cert.pem
    - name: CCR_FQDN
      value: $ccrFqdn
    ports:
    - name: https
      containerPort: $listenerPort
      protocol: TCP
    startupProbe:
      tcpSocket:
        port: $listenerPort
      initialDelaySeconds: 3
      periodSeconds: 5
      failureThreshold: 30
    volumeMounts:
    - name: shared
      mountPath: /app/service
      readOnly: false
